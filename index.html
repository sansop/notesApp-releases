<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notes App Releases</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 10%, rgba(155, 92, 255, 0.22), transparent 32rem), #070912;
        color: #f4f4f5;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(760px, calc(100% - 32px));
        padding: 40px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 18px;
        background: rgba(20, 23, 34, 0.88);
      }
      h1 { margin: 0; font-size: clamp(36px, 7vw, 64px); letter-spacing: 0; }
      p { color: #a1a1aa; line-height: 1.6; font-size: 18px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Notes App Releases</h1>
      <p>The public download page is ready. The latest macOS build will appear here after the private app repository publishes a release.</p>
    </main>
  </body>
</html>
